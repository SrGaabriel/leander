name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ""
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ""
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            ext: ""
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-26
            ext: ""
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: ".exe"
            cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            ext: ".exe"
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build proxy
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p proxy --release --target ${{ matrix.target }}
          else
            cargo build -p proxy --release --target ${{ matrix.target }}
          fi

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/proxy${{ matrix.ext }}" \
             "dist/leander-proxy-${{ matrix.target }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: leander-proxy-${{ matrix.target }}
          path: dist/leander-proxy-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/leander-proxy-*
          generate_release_notes: true
          fail_on_unmatched_files: true
